<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blitzit Pro - Ultimate Task Manager</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            colors: {
              gray: {
                750: "#2d3748",
                850: "#1a202c",
                950: "#171923",
              },
            },
            animation: {
              "bounce-short": "bounce 1s infinite 2s",
              "pulse-fast": "pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite",
            },
          },
        },
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e0;
        border-radius: 3px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #4a5568;
      }
      .dark ::-webkit-scrollbar-track {
        background: #2d3748;
      }

      /* Animations */
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-slide-in {
        animation: slideIn 0.3s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Drag & Drop */
      .task-card {
        cursor: grab;
        touch-action: none;
      }
      .task-card:active {
        cursor: grabbing;
      }

      /* Column Hover Effect */
      .column-hover {
        background-color: rgba(99, 102, 241, 0.1);
        border-radius: 0.5rem;
        transition: background-color 0.2s;
      }
      .dark .column-hover {
        background-color: rgba(99, 102, 241, 0.2);
      }

      /* Modal Transitions */
      .modal-backdrop {
        transition: opacity 0.3s ease-in-out;
      }
      .modal-content {
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.3s ease-in-out;
      }

      /* Auth Screen Styles */
      .auth-bg {
        background-image: url("https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop");
        background-size: cover;
        background-position: center;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 overflow-hidden"
  >
    <div
      id="auth-screen"
      class="fixed inset-0 z-[100] flex items-center justify-center auth-bg"
    >
      <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm"></div>

      <div
        class="relative bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 transform transition-all animate-slide-in border border-white/20"
      >
        <div class="flex justify-center mb-6">
          <div class="bg-indigo-600 p-3 rounded-xl shadow-lg">
            <i class="fas fa-bolt text-white text-3xl"></i>
          </div>
        </div>

        <h2
          class="text-3xl font-extrabold text-center text-gray-900 dark:text-white mb-2"
        >
          Blitzit Pro
        </h2>
        <p class="text-center text-gray-500 dark:text-gray-400 mb-8 text-sm">
          Sign in to access your workspace
        </p>

        <form
          id="login-form"
          class="space-y-5"
          onsubmit="event.preventDefault(); handleLogin();"
        >
          <div>
            <label
              class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-1"
              >Username</label
            >
            <div class="relative">
              <i class="fas fa-user absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="text"
                id="login-username"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-colors"
                placeholder="Enter username"
                required
              />
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-1"
              >Password</label
            >
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="password"
                id="login-password"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-colors"
                placeholder="••••••••"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all transform active:scale-95"
          >
            Log In
          </button>

          <div class="text-center mt-4">
            <span class="text-gray-500 text-sm">New here?</span>
            <button
              type="button"
              onclick="toggleAuthMode('register')"
              class="text-indigo-600 dark:text-indigo-400 font-bold text-sm hover:underline ml-1"
            >
              Create Account
            </button>
          </div>
        </form>

        <form
          id="register-form"
          class="space-y-5 hidden"
          onsubmit="event.preventDefault(); handleRegister();"
        >
          <div>
            <label
              class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-1"
              >Choose Username</label
            >
            <div class="relative">
              <i
                class="fas fa-user-plus absolute left-3 top-3.5 text-gray-400"
              ></i>
              <input
                type="text"
                id="reg-username"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-colors"
                placeholder="Username"
                required
              />
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-1"
              >Password</label
            >
            <div class="relative">
              <i class="fas fa-lock absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="password"
                id="reg-password"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-colors"
                placeholder="Create password"
                required
              />
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-bold text-gray-700 dark:text-gray-300 uppercase mb-1"
              >Confirm Password</label
            >
            <div class="relative">
              <i
                class="fas fa-check-circle absolute left-3 top-3.5 text-gray-400"
              ></i>
              <input
                type="password"
                id="reg-confirm"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white transition-colors"
                placeholder="Confirm password"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="w-full py-3.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg hover:shadow-green-500/30 transition-all transform active:scale-95"
          >
            Sign Up
          </button>

          <div class="text-center mt-4">
            <span class="text-gray-500 text-sm">Already have an account?</span>
            <button
              type="button"
              onclick="toggleAuthMode('login')"
              class="text-indigo-600 dark:text-indigo-400 font-bold text-sm hover:underline ml-1"
            >
              Log In
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="app-container" class="hidden h-screen flex-col">
      <header
        class="flex flex-col lg:flex-row justify-between items-center py-6 px-4 sm:px-6 lg:px-8 gap-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-30 shadow-sm"
      >
        <div
          class="flex items-center gap-3 w-full lg:w-auto justify-between lg:justify-start"
        >
          <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
              <i class="fas fa-bolt text-white text-xl"></i>
            </div>
            <div>
              <h1
                class="text-xl md:text-2xl font-extrabold tracking-tight dark:text-white"
              >
                Blitzit
                <span class="text-indigo-600 dark:text-indigo-400">Pro</span>
              </h1>
              <button
                onclick="openProfileModal()"
                class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 font-medium hover:bg-gray-100 dark:hover:bg-gray-800 px-2 py-1 -ml-2 rounded-lg transition-colors group"
                title="View Profile"
              >
                <span
                  class="w-5 h-5 rounded-full bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400 flex items-center justify-center text-[10px] font-bold"
                >
                  <i class="fas fa-user"></i>
                </span>
                <span
                  id="current-user-display"
                  class="text-indigo-600 dark:text-indigo-400 font-bold group-hover:underline"
                  >User</span
                >
              </button>
            </div>
          </div>

          <div class="flex items-center gap-3 lg:ml-6">
            <div
              class="flex items-center gap-1.5 bg-orange-50 dark:bg-orange-900/20 px-3 py-1.5 rounded-full border border-orange-100 dark:border-orange-800/50 shadow-sm"
              title="Current Daily Streak"
            >
              <i class="fas fa-fire text-orange-500 animate-pulse-fast"></i>
              <div class="flex flex-col leading-none">
                <span
                  id="streak-counter"
                  class="font-bold text-orange-600 dark:text-orange-400 text-sm"
                  >0</span
                >
                <span
                  class="text-[8px] font-bold text-orange-400 uppercase tracking-wide"
                  >Streak</span
                >
              </div>
            </div>

            <div
              class="flex items-center gap-1.5 bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-full border border-blue-100 dark:border-blue-800/50 shadow-sm"
              title="User Level"
            >
              <i class="fas fa-star text-blue-500"></i>
              <div class="flex flex-col leading-none">
                <span
                  id="level-counter"
                  class="font-bold text-blue-600 dark:text-blue-400 text-sm"
                  >Lvl 1</span
                >
                <span
                  class="text-[8px] font-bold text-blue-400 uppercase tracking-wide"
                  >Rank</span
                >
              </div>
            </div>
          </div>
        </div>

        <nav class="flex flex-wrap justify-center gap-3 items-center">
          <button
            id="nav-kanban"
            onclick="setView('kanban')"
            class="nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all bg-indigo-600 text-white shadow-md hover:bg-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
          >
            <i class="fas fa-columns mr-2"></i>Board
          </button>
          <button
            id="nav-stats"
            onclick="setView('stats')"
            class="nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 hover:text-indigo-600 shadow-sm dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-750 dark:hover:text-white"
          >
            <i class="fas fa-chart-pie mr-2"></i>Analytics
          </button>

          <div class="h-6 w-px bg-gray-300 dark:bg-gray-700 mx-1"></div>

          <button
            onclick="toggleDarkMode()"
            class="p-2 rounded-full text-gray-500 hover:bg-gray-200 dark:text-gray-400 dark:hover:bg-gray-700 transition-colors"
            title="Toggle Dark Mode"
          >
            <i id="theme-icon" class="fas fa-moon text-lg"></i>
          </button>

          <button
            onclick="handleLogout()"
            class="ml-2 px-3 py-2 rounded-lg text-red-600 border border-red-200 hover:bg-red-50 dark:text-red-400 dark:border-red-900/50 dark:hover:bg-red-900/20 transition-colors text-sm font-bold flex items-center gap-2"
            title="Sign Out"
          >
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </nav>
      </header>

      <div class="flex-grow overflow-y-auto p-4 sm:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto w-full h-full flex flex-col">
          <div
            id="filter-search-container"
            class="mb-6 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex flex-col md:flex-row gap-4 transition-colors animate-fade-in"
          >
            <div class="relative w-full md:w-1/2">
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
              >
                <i class="fas fa-search text-gray-400"></i>
              </div>
              <input
                type="text"
                id="task-search"
                oninput="handleSearch(event)"
                placeholder="Search tasks, tags, or descriptions..."
                class="w-full pl-10 pr-4 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none bg-gray-50 dark:bg-gray-750 dark:text-white transition-colors"
              />
            </div>
            <div class="flex gap-3 w-full md:w-1/2">
              <select
                id="priority-filter"
                onchange="handleFilterChange()"
                class="flex-1 py-2.5 px-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white dark:bg-gray-750 dark:text-white transition-colors text-sm"
              >
                <option value="">All Priorities</option>
                <option value="high">🔥 High Priority</option>
                <option value="medium">⚡ Medium Priority</option>
                <option value="low">🌱 Low Priority</option>
              </select>
              <select
                id="due-date-filter"
                onchange="handleFilterChange()"
                class="flex-1 py-2.5 px-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white dark:bg-gray-750 dark:text-white transition-colors text-sm"
              >
                <option value="">All Dates</option>
                <option value="overdue">⚠️ Overdue</option>
                <option value="today">📅 Due Today</option>
                <option value="week">🗓️ Due This Week</option>
              </select>
            </div>
          </div>

          <div
            id="app-content"
            class="flex-grow relative animate-fade-in"
          ></div>
        </div>
      </div>

      <button
        onclick="showModal()"
        class="fixed bottom-8 right-8 w-16 h-16 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white text-2xl shadow-xl hover:shadow-2xl transform hover:scale-110 transition-all duration-300 z-40 flex items-center justify-center group"
        title="Create New Task"
      >
        <i
          class="fas fa-plus group-hover:rotate-90 transition-transform duration-300"
        ></i>
      </button>
    </div>

    <div
      id="toast"
      class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-300 z-[70] flex items-center gap-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full shadow-2xl"
    >
      <i id="toast-icon" class="fas fa-info-circle"></i>
      <div class="flex flex-col">
        <span id="toast-message" class="font-medium text-sm">Notification</span>
        <span id="toast-sub" class="text-xs opacity-80 hidden"></span>
      </div>
    </div>

    <div
      id="taskModal"
      class="fixed inset-0 z-50 hidden"
      aria-labelledby="modal-title"
      role="dialog"
      aria-modal="true"
    >
      <div
        class="absolute inset-0 bg-gray-900/70 backdrop-blur-sm transition-opacity modal-backdrop opacity-0"
        onclick="hideModal()"
      ></div>
      <div class="fixed inset-0 z-10 overflow-y-auto">
        <div
          class="flex min-h-full items-center justify-center p-4 text-center sm:p-0"
        >
          <div
            class="relative transform overflow-hidden rounded-2xl bg-white dark:bg-gray-800 text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-lg scale-95 opacity-0 modal-content border border-gray-200 dark:border-gray-700"
          >
            <div
              class="bg-white dark:bg-gray-800 px-4 pb-4 pt-5 sm:p-6 sm:pb-4"
            >
              <div class="flex justify-between items-center mb-5">
                <h3
                  class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2"
                  id="modal-title"
                >
                  <div
                    class="w-8 h-8 rounded-full bg-indigo-100 dark:bg-indigo-900 flex items-center justify-center text-indigo-600 dark:text-indigo-400 text-sm"
                  >
                    <i class="fas fa-pen"></i>
                  </div>
                  <span id="modal-header-text">New Task</span>
                </h3>
                <button
                  onclick="hideModal()"
                  class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 transition-colors"
                >
                  <i class="fas fa-times text-xl"></i>
                </button>
              </div>
              <form
                id="taskForm"
                onsubmit="event.preventDefault(); handleTaskSubmit();"
              >
                <input type="hidden" id="task-id-input" />
                <input type="hidden" id="task-status-input" value="college" />

                <div class="mb-4">
                  <label
                    class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                    >Title</label
                  >
                  <input
                    type="text"
                    id="task-title-input"
                    required
                    class="w-full p-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white font-medium placeholder-gray-400 transition-colors"
                    placeholder="What needs to be done?"
                  />
                </div>
                <div class="mb-4">
                  <label
                    class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                    >Description</label
                  >
                  <textarea
                    id="task-desc-input"
                    rows="3"
                    class="w-full p-3 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white text-sm placeholder-gray-400 transition-colors"
                    placeholder="Add details..."
                  ></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                  <div>
                    <label
                      class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                      >Due Date</label
                    >
                    <input
                      type="date"
                      id="task-date-input"
                      class="w-full p-2.5 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white text-sm dark:fill-white transition-colors"
                    />
                  </div>
                  <div>
                    <label
                      class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                      >Priority</label
                    >
                    <select
                      id="task-priority-input"
                      class="w-full p-2.5 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white text-sm transition-colors"
                    >
                      <option value="low">Low</option>
                      <option value="medium">Medium</option>
                      <option value="high">High</option>
                    </select>
                  </div>
                </div>
                <div class="mb-4">
                  <label
                    class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                    >Tags
                    <span class="text-gray-400 normal-case font-normal"
                      >(comma separated)</span
                    ></label
                  >
                  <input
                    type="text"
                    id="task-tags-input"
                    class="w-full p-2.5 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white text-sm placeholder-gray-400 transition-colors"
                    placeholder="e.g. Design, Marketing, Urgent"
                  />
                </div>
                <div class="mb-2">
                  <label
                    class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1"
                    >Subtasks</label
                  >
                  <div class="flex gap-2 mb-2">
                    <input
                      type="text"
                      id="new-subtask-input"
                      class="flex-1 p-2 bg-gray-50 dark:bg-gray-750 border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white text-sm"
                      placeholder="Add a checklist item"
                      onkeypress="if(event.key === 'Enter') { event.preventDefault(); addSubtaskFromInput(); }"
                    />
                    <button
                      type="button"
                      onclick="addSubtaskFromInput()"
                      class="px-3 py-2 bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
                    >
                      <i class="fas fa-plus"></i>
                    </button>
                  </div>
                  <div
                    id="subtask-list-container"
                    class="space-y-2 max-h-32 overflow-y-auto pr-1"
                  ></div>
                </div>
                <div
                  class="flex flex-row-reverse gap-2 mt-6 pt-4 border-t border-gray-100 dark:border-gray-700"
                >
                  <button
                    type="submit"
                    class="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium shadow-md hover:shadow-lg transition-all transform active:scale-95"
                  >
                    Save Task
                  </button>
                  <button
                    type="button"
                    onclick="hideModal()"
                    class="px-5 py-2.5 bg-white dark:bg-transparent border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg font-medium hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="detailModal"

    <script>
      // --- AUTHENTICATION & USER CONFIGURATION ---
      const USERS_KEY = "blitzit_users_db";
      let CURRENT_USER_KEY = null;
      let currentUser = null;
      let chartInstances = {};

      // Default Data Template
      const DEFAULT_DATA = {
        tasks: [],
        stats: [],
        settings: { darkMode: false },
        gamification: { level: 1, xp: 0 }, // Stores XP and Level
      };

      let appData = { ...DEFAULT_DATA };
      let dragSrcEl = null;
      let currentEditId = null;
      let tempSubtasks = [];
      const columns = [
        {
          id: "college",
          title: "College Work",
          icon: "fa-graduation-cap",
          color: "blue",
          bg: "blue",
        },
        {
          id: "home",
          title: "Home Tasks",
          icon: "fa-home",
          color: "amber",
          bg: "yellow",
        },
        {
          id: "personal",
          title: "Personal Goals",
          icon: "fa-user",
          color: "purple",
          bg: "indigo",
        },
        {
          id: "completed",
          title: "Finished Tasks",
          icon: "fa-check-circle",
          color: "green",
          bg: "green",
        },
      ];
      let filters = { search: "", priority: "", date: "" };

      // --- INITIALIZATION ---
      window.addEventListener("DOMContentLoaded", () => {
        checkSession();
      });

      // --- AUTHENTICATION LOGIC ---
      function getUsersDB() {
        const db = localStorage.getItem(USERS_KEY);
        return db ? JSON.parse(db) : {};
      }
      function saveUsersDB(db) {
        localStorage.setItem(USERS_KEY, JSON.stringify(db));
      }
      function toggleAuthMode(mode) {
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");
        const loginUsername = document.getElementById("login-username");
        const regUsername = document.getElementById("reg-username");
        document.querySelectorAll("input").forEach((i) => (i.value = ""));
        if (mode === "register") {
          loginForm.classList.add("hidden");
          registerForm.classList.remove("hidden");
          registerForm.classList.add("animate-fade-in");
          setTimeout(() => regUsername.focus(), 100);
        } else {
          registerForm.classList.add("hidden");
          loginForm.classList.remove("hidden");
          loginForm.classList.add("animate-fade-in");
          setTimeout(() => loginUsername.focus(), 100);
        }
      }
      function handleRegister() {
        const u = document.getElementById("reg-username").value.trim();
        const p = document.getElementById("reg-password").value;
        const c = document.getElementById("reg-confirm").value;
        if (u.length < 3) return showToast("Username too short", "error");
        if (p.length < 4) return showToast("Password too short", "error");
        if (p !== c) return showToast("Passwords do not match", "error");
        const db = getUsersDB();
        if (db[u]) return showToast("Username already taken", "error");
        db[u] = { password: p, created: new Date().toISOString() };
        saveUsersDB(db);
        showToast("Account created! Please log in.", "success");
        toggleAuthMode("login");
        document.getElementById("login-username").value = u;
        document.getElementById("login-password").focus();
      }
      function handleLogin() {
        const u = document.getElementById("login-username").value.trim();
        const p = document.getElementById("login-password").value;
        const db = getUsersDB();
        if (db[u] && db[u].password === p) {
          loginUser(u);
        } else {
          showToast("Invalid username or password", "error");
        }
      }
      function loginUser(username) {
        currentUser = username;
        CURRENT_USER_KEY = `blitzit_data_${username}`;
        localStorage.setItem("blitzit_session_user", username);
        document.getElementById("current-user-display").textContent = username;
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app-container").classList.remove("hidden");
        document.getElementById("app-container").classList.add("flex");
        loadData();
        initTheme();
        calculateStreakAndLevel(); // Calc stats on login
        setView("kanban");
        showToast(`Welcome back, ${username}!`, "success");
      }
      function checkSession() {
        const sessionUser = localStorage.getItem("blitzit_session_user");
        if (sessionUser) {
          const db = getUsersDB();
          if (db[sessionUser]) {
            loginUser(sessionUser);
          } else {
            localStorage.removeItem("blitzit_session_user");
          }
        }
      }
      function handleLogout() {
        currentUser = null;
        CURRENT_USER_KEY = null;
        localStorage.removeItem("blitzit_session_user");
        document.getElementById("app-container").classList.add("hidden");
        document.getElementById("app-container").classList.remove("flex");
        document.getElementById("auth-screen").classList.remove("hidden");
        document.querySelectorAll("input").forEach((i) => (i.value = ""));
        toggleAuthMode("login");
        appData = { ...DEFAULT_DATA };
        document.documentElement.classList.remove("dark");
        showToast("Logged out successfully", "neutral");
      }

      // --- PROFILE & ACCOUNT MANAGEMENT ---
      function openProfileModal() {
        if (!currentUser) return;
        const db = getUsersDB();
        const userEntry = db[currentUser] || {
          created: new Date().toISOString(),
        };
        const joinedDate = new Date(userEntry.created).toLocaleDateString(
          "en-US",
          {
            month: "short",
            year: "numeric",
          }
        );

        // Update Content
        document.getElementById("profile-username").innerText = currentUser;
        document.getElementById("profile-avatar").innerText = currentUser
          .charAt(0)
          .toUpperCase();
        document.getElementById("profile-joined").innerText =
          "Joined " + joinedDate;

        // Stats
        const level = appData.gamification?.level || 1;
        const xp = appData.gamification?.xp || 0;
        const totalTasks = appData.stats.length + appData.tasks.length;

        document.getElementById("profile-level").innerText = level;
        document.getElementById("profile-xp").innerText = xp;
        document.getElementById("profile-tasks").innerText = totalTasks;

        // Reset Form
        document.getElementById("new-username-input").value = "";
        document.getElementById("confirm-pass-input").value = "";

        toggleModal("profileModal", true);
      }

      function hideProfileModal() {
        toggleModal("profileModal", false);
      }

      function handleUsernameChange() {
        const newName = document
          .getElementById("new-username-input")
          .value.trim();
        const password = document.getElementById("confirm-pass-input").value;

        if (newName.length < 3)
          return showToast("New username is too short", "error");
        if (newName === currentUser)
          return showToast("New username must be different", "error");

        const db = getUsersDB();

        // Check Password
        if (!db[currentUser] || db[currentUser].password !== password) {
          return showToast("Incorrect password", "error");
        }

        // Check if new name exists
        if (db[newName]) {
          return showToast("Username already taken", "error");
        }

        // --- MIGRATION LOGIC ---
        // 1. Migrate User DB entry
        db[newName] = { ...db[currentUser] }; // Copy user data
        delete db[currentUser]; // Remove old entry
        saveUsersDB(db);

        // 2. Migrate App Data (LocalStorage)
        const oldKey = `blitzit_data_${currentUser}`;
        const newKey = `blitzit_data_${newName}`;
        const currentData = localStorage.getItem(oldKey);
        if (currentData) {
          localStorage.setItem(newKey, currentData);
          localStorage.removeItem(oldKey);
        }

        // 3. Update Session & Global Vars
        localStorage.setItem("blitzit_session_user", newName);
        currentUser = newName;
        CURRENT_USER_KEY = newKey;

        // 4. Refresh UI
        document.getElementById("current-user-display").textContent = newName;
        showToast("Username updated successfully!", "success");
        hideProfileModal();
      }

      // --- DATA MANAGEMENT ---
      function loadData() {
        if (!CURRENT_USER_KEY) return;
        const raw = localStorage.getItem(CURRENT_USER_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          appData = {
            ...DEFAULT_DATA,
            ...parsed,
            settings: { ...DEFAULT_DATA.settings, ...parsed.settings },
            gamification: {
              ...DEFAULT_DATA.gamification,
              ...(parsed.gamification || {}),
            },
          };
          appData.tasks = appData.tasks.map((t) => ({
            ...t,
            subtasks: t.subtasks || [],
            tags: t.tags || [],
          }));
          appData.stats = appData.stats.map((s) => ({
            ...s,
            category: s.category || "personal",
          }));
        } else {
          appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
        }
      }
      function saveData() {
        if (!CURRENT_USER_KEY) return;
        localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(appData));
      }
      function confirmResetAll() {
        showConfirmDialog(
          "Reset Application",
          "This will delete ALL tasks and statistics for YOUR account only. Are you sure?",
          () => {
            appData.tasks = [];
            appData.stats = [];
            appData.gamification = { level: 1, xp: 0 };
            saveData();
            calculateStreakAndLevel();
            setView("kanban");
            showToast("Account data reset complete.", "neutral");
          }
        );
      }

      // --- GAMIFICATION LOGIC ---
      function calculateStreakAndLevel() {
        // 1. Calculate Streak Dynamically from Stats history
        // Strategy: Sort completed dates. Check if today or yesterday exists. If so, count backwards consecutively.
        const uniqueDates = [
          ...new Set(appData.stats.map((s) => s.completedAt.split("T")[0])),
        ]
          .sort()
          .reverse();

        let streak = 0;
        const todayStr = new Date().toISOString().split("T")[0];
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().split("T")[0];

        if (uniqueDates.length > 0) {
          // If latest completion is neither today nor yesterday, streak is broken (0)
          if (uniqueDates[0] === todayStr || uniqueDates[0] === yesterdayStr) {
            streak = 1; // Current block started
            let checkDate = new Date(uniqueDates[0]); // Start checking backwards from the latest valid date

            for (let i = 1; i < uniqueDates.length; i++) {
              const prevDate = new Date(uniqueDates[i]);
              const diffTime = Math.abs(checkDate - prevDate);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

              if (diffDays === 1) {
                streak++;
                checkDate = prevDate;
              } else {
                break; // Gap found
              }
            }
          }
        }

        // 2. Calculate XP and Level
        // Formula: Level = Math.floor(Math.sqrt(XP / 100)) + 1
        // Each task = 50 XP
        const totalCompleted = appData.stats.length;
        const currentXP = totalCompleted * 50;
        const level = Math.floor(Math.sqrt(currentXP / 100)) + 1;

        // Update UI
        const streakEl = document.getElementById("streak-counter");
        const levelEl = document.getElementById("level-counter");

        // Update global appData for access in Profile
        appData.gamification = { level, xp: currentXP };

        // Animate if changed
        if (streakEl.innerText !== streak.toString()) {
          streakEl.innerText = streak;
          streakEl.parentElement.classList.add("scale-110");
          setTimeout(
            () => streakEl.parentElement.classList.remove("scale-110"),
            200
          );
        }

        if (levelEl.innerText !== `Lvl ${level}`) {
          levelEl.innerText = `Lvl ${level}`;
          // Level up celebration logic could go here if we tracked previous level state
        }
      }

      function awardXP(points = 50) {
        calculateStreakAndLevel(); // Recalc based on new stat
      }

      // --- THEME ENGINE ---
      function initTheme() {
        if (appData.settings.darkMode) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        updateThemeIcon();
      }
      function toggleDarkMode() {
        appData.settings.darkMode = !appData.settings.darkMode;
        saveData();
        initTheme();
      }
      function updateThemeIcon() {
        const icon = document.getElementById("theme-icon");
        if (appData.settings.darkMode) {
          icon.className = "fas fa-sun text-yellow-400 text-lg";
        } else {
          icon.className = "fas fa-moon text-indigo-600 text-lg";
        }
      }

      // --- NAVIGATION & VIEWS ---
      function setView(viewName) {
        document.getElementById("nav-kanban").className =
          viewName === "kanban"
            ? "nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all bg-indigo-600 text-white shadow-md"
            : "nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 hover:text-indigo-600";
        document.getElementById("nav-stats").className =
          viewName === "stats"
            ? "nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all bg-indigo-600 text-white shadow-md"
            : "nav-btn px-4 py-2 rounded-lg font-semibold text-sm transition-all text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-750 dark:hover:text-white";
        const container = document.getElementById("app-content");
        const filterBar = document.getElementById("filter-search-container");
        if (viewName === "kanban") {
          filterBar.style.display = "flex";
          renderKanban(container);
        } else {
          filterBar.style.display = "none";
          renderStats(container);
        }
      }

      // --- KANBAN LOGIC ---
      function renderKanban(container) {
        const filteredTasks = appData.tasks.filter((t) => {
          const matchSearch =
            !filters.search ||
            t.title.toLowerCase().includes(filters.search.toLowerCase()) ||
            (t.description &&
              t.description
                .toLowerCase()
                .includes(filters.search.toLowerCase())) ||
            t.tags.some((tag) =>
              tag.toLowerCase().includes(filters.search.toLowerCase())
            );
          const matchPriority =
            !filters.priority || t.priority === filters.priority;
          let matchDate = true;
          if (filters.date && t.dueDate && t.status !== "completed") {
            const d = new Date(t.dueDate).setHours(0, 0, 0, 0);
            const today = new Date().setHours(0, 0, 0, 0);
            if (filters.date === "overdue") matchDate = d < today;
            else if (filters.date === "today") matchDate = d === today;
            else if (filters.date === "week") {
              const nextWeek = new Date(today);
              nextWeek.setDate(nextWeek.getDate() + 7);
              matchDate = d >= today && d <= nextWeek;
            }
          } else if (filters.date) {
            matchDate = false;
          }
          return matchSearch && matchPriority && matchDate;
        });
        let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 pb-20">`;
        columns.forEach((col) => {
          const tasksInCol = filteredTasks.filter((t) => t.status === col.id);
          tasksInCol.sort((a, b) => {
            if (col.id === "completed")
              return (
                new Date(b.completedAt || 0) - new Date(a.completedAt || 0)
              );
            const pMap = { high: 3, medium: 2, low: 1 };
            if (pMap[b.priority] !== pMap[a.priority])
              return pMap[b.priority] - pMap[a.priority];
            return (
              new Date(a.dueDate || "9999-12-31") -
              new Date(b.dueDate || "9999-12-31")
            );
          });
          const bgClass =
            col.id === "completed"
              ? "bg-green-50/50 dark:bg-green-900/10 border-t-4 border-green-500"
              : `bg-gray-50/50 dark:bg-gray-800/40 border-t-4 border-${col.color}-500`;
          html += `
              <div class="flex flex-col h-full rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 transition-colors ${bgClass}"
                   ondragover="allowDrop(event)" 
                   ondrop="drop(event)" 
                   ondragenter="dragEnter(event)"
                   ondragleave="dragLeave(event)"
                   data-status="${col.id}">
                <div class="p-4 flex justify-between items-center border-b border-gray-100 dark:border-gray-700/50 bg-white/50 dark:bg-gray-800/50 rounded-t-xl">
                  <div class="flex items-center gap-2 font-bold text-gray-700 dark:text-gray-200">
                    <i class="fas ${col.icon} text-${col.color}-500"></i>
                    ${col.title}
                    <span class="ml-2 bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs py-0.5 px-2 rounded-full">${
                      tasksInCol.length
                    }</span>
                  </div>
                  <div class="flex items-center gap-2">
                    ${
                      col.id !== "completed"
                        ? `<button onclick="showModal('${col.id}')" class="text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors p-1" title="Add Task to ${col.title}">
                             <i class="fas fa-plus"></i>
                           </button>`
                        : ""
                    }
                    ${
                      col.id === "completed" && tasksInCol.length > 0
                        ? `<button onclick="clearCompleted()" class="text-xs text-red-400 hover:text-red-600 dark:hover:text-red-300 font-medium transition-colors" title="Clear All">Clear</button>`
                        : ""
                    }
                  </div>
                </div>
                <div class="flex-grow p-3 space-y-3 overflow-y-auto min-h-[150px] max-h-[calc(100vh-280px)] scrollbar-hide">
                  ${tasksInCol.map((task) => generateTaskCard(task)).join("")}
                  ${
                    tasksInCol.length === 0
                      ? `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 py-10 border-2 border-dashed border-gray-200 dark:border-gray-700 rounded-lg">
                        <i class="fas fa-ghost text-2xl mb-2 opacity-50"></i>
                        <span class="text-xs font-medium">No Tasks</span>
                    </div>
                  `
                      : ""
                  }
                </div>
              </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
      }

      function generateTaskCard(task) {
        const isCompleted = task.status === "completed";

        // Styles based on priority
        const priorityStyles = {
          high: "bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400",
          medium:
            "bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400",
          low: "bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400",
        };

        // Date Logic
        let dateDisplay = "";
        if (task.dueDate && !isCompleted) {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const due = new Date(task.dueDate);
          due.setHours(0, 0, 0, 0);
          const diffTime = due - today;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

          let dateClass = "text-orange-500";
          let dateText = "";

          if (diffDays < 0) {
            dateClass = "text-red-600 font-bold";
            dateText = "Overdue";
          } else if (diffDays === 0) {
            dateClass = "text-orange-600 font-bold";
            dateText = "Due Today";
          } else if (diffDays === 1) {
            dateClass = "text-orange-500";
            dateText = "Due Tomorrow";
          } else {
            dateText = `Due in ${diffDays} days`;
          }

          dateDisplay = `<span class="${dateClass} flex items-center gap-1"><i class="far fa-clock"></i> ${dateText}</span>`;
        } else if (isCompleted) {
          dateDisplay = `<span class="text-green-500 flex items-center gap-1"><i class="fas fa-check"></i> Done</span>`;
        } else {
          dateDisplay = `<span class="text-gray-400">No Date</span>`;
        }

        // Subtask Progress
        let progressHtml = "";
        if (task.subtasks && task.subtasks.length > 0) {
          const completedCount = task.subtasks.filter(
            (s) => s.completed
          ).length;
          const total = task.subtasks.length;
          const percent = Math.round((completedCount / total) * 100);

          progressHtml = `
                <div class="mt-3">
                    <div class="flex justify-between text-xs text-gray-500 dark:text-gray-400 mb-1">
                        <span class="font-medium">Subtasks</span>
                        <span>${completedCount}/${total}</span>
                    </div>
                    <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-1.5 overflow-hidden">
                        <div class="bg-indigo-500 h-full rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        }

        // Tags
        let tagsHtml = "";
        if (task.tags.length > 0) {
          tagsHtml =
            `<div class="flex flex-wrap gap-1 mt-3">` +
            task.tags
              .map(
                (t) =>
                  `<span class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 text-[10px] font-medium rounded border border-gray-200 dark:border-gray-600">${t}</span>`
              )
              .join("") +
            `</div>`;
        }

        return `
          <div class="task-card bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 hover:shadow-md transition-all animate-slide-in group relative flex flex-col"
               draggable="${!isCompleted}"
               ondragstart="dragStart(event)"
               onclick="openTaskDetails('${task.id}')"
               data-id="${task.id}">
            
            <div class="flex justify-between items-start mb-2 w-full">
                <h4 class="font-bold text-gray-800 dark:text-gray-100 text-base leading-tight w-3/4 ${
                  isCompleted ? "line-through text-gray-400" : ""
                }">${task.title}</h4>
                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide ${
                  priorityStyles[task.priority] || "bg-gray-100 text-gray-500"
                }">
                    ${task.priority}
                </span>
            </div>

            <div class="flex justify-between items-center text-sm mt-1 mb-1">
                <span class="text-gray-500 dark:text-gray-400 font-medium">Due Date:</span>
                <div class="text-xs font-medium">${dateDisplay}</div>
            </div>

            ${progressHtml}

            ${tagsHtml}

            <div class="flex items-center justify-between mt-4 pt-3 border-t border-gray-100 dark:border-gray-700">
                ${
                  !isCompleted
                    ? `<button onclick="event.stopPropagation(); markTaskComplete('${task.id}')" class="bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-green-100 dark:hover:bg-green-900/40 transition-colors">
                        <i class="fas fa-check"></i> Complete
                     </button>`
                    : `<button onclick="event.stopPropagation(); revertTask('${task.id}')" class="bg-amber-50 text-amber-600 dark:bg-amber-900/20 dark:text-amber-400 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-colors">
                        <i class="fas fa-rotate-left"></i> Revert
                     </button>`
                }
                
                <div class="flex gap-2">
                    <button onclick="event.stopPropagation(); deleteTask('${
                      task.id
                    }')" class="bg-red-50 text-red-500 dark:bg-red-900/20 dark:text-red-400 p-2 rounded-lg text-xs hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                    
                    <button onclick="openTaskDetails('${
                      task.id
                    }')" class="bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">
                        <i class="fas fa-eye"></i> Details
                    </button>
                </div>
            </div>
          </div>
        `;
      }

      // --- DRAG & DROP & ACTIONS ---
      function dragStart(e) {
        e.dataTransfer.setData("text/plain", e.target.dataset.id);
        e.dataTransfer.effectAllowed = "move";
        dragSrcEl = e.target;
        e.target.classList.add("opacity-50");
      }
      function dragEnter(e) {
        e.preventDefault();
        e.currentTarget.classList.add("column-hover");
      }
      function dragLeave(e) {
        e.currentTarget.classList.remove("column-hover");
      }
      function allowDrop(e) {
        e.preventDefault();
      }

      function drop(e) {
        e.preventDefault();
        const col = e.currentTarget;
        col.classList.remove("column-hover");
        dragSrcEl.classList.remove("opacity-50");
        const taskId = e.dataTransfer.getData("text/plain");
        const newStatus = col.dataset.status;

        const task = appData.tasks.find((t) => t.id === taskId);
        if (task && task.status !== newStatus) {
          if (newStatus === "completed") {
            completeTaskLogic(task);
          } else {
            // Moving between active columns or reverting via drag
            if (task.status === "completed") {
              task.completedAt = null;
            } // Reset if dragging back
            task.status = newStatus;
            saveData();
            setView("kanban");
          }
        }
      }

      // Unified Completion Logic
      function completeTaskLogic(task) {
        const originalStatus = task.status;
        task.status = "completed";
        task.completedAt = new Date().toISOString();

        // Add to Stats
        appData.stats.push({
          id: task.id,
          title: task.title,
          completedAt: task.completedAt,
          priority: task.priority,
          category: originalStatus,
        });

        // Trigger Effects
        awardXP(50);
        showToast("Task Completed! +50 XP 🔥", "success", "Streak Updated!");

        // We can trigger confetti at center screen for button clicks
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

        saveData();
        setView("kanban");
      }

      function markTaskComplete(taskId) {
        const task = appData.tasks.find((t) => t.id === taskId);
        if (task) completeTaskLogic(task);
      }

      function revertTask(taskId) {
        const task = appData.tasks.find((t) => t.id === taskId);
        if (!task) return;

        // Find the latest stat entry for this task to restore its original category
        // We look from the end of the array to find the most recent completion
        let statIndex = -1;
        let originalCategory = "college"; // Default fallback

        for (let i = appData.stats.length - 1; i >= 0; i--) {
          if (appData.stats[i].id === taskId) {
            statIndex = i;
            originalCategory = appData.stats[i].category || "college";
            break;
          }
        }

        // Remove the stat entry to "undo" the completion in statistics
        if (statIndex !== -1) {
          appData.stats.splice(statIndex, 1);
        }

        // Restore Task
        task.status = originalCategory;
        task.completedAt = null;

        // Deduct XP (Simplification: just recalc streak/level from remaining stats)
        calculateStreakAndLevel();

        saveData();
        setView("kanban");
        showToast("Task Reverted", "neutral");
      }

      function triggerConfetti(x, y) {
        const xNorm = x / window.innerWidth;
        const yNorm = y / window.innerHeight;
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: yNorm, x: xNorm },
          colors: ["#6366f1", "#10b981", "#f59e0b", "#ef4444"],
        });
      }

      // --- MODALS & ACTIONS ---
      // UPDATED: showModal now accepts a status to pre-fill the category
      function showModal(defaultStatus = "college") {
        currentEditId = null;
        tempSubtasks = [];
        document.getElementById("taskForm").reset();
        document.getElementById("modal-header-text").innerText = "New Task";

        document.getElementById("modal-header-text").innerText = "Edit Task";
        document.getElementById("task-title-input").value = task.title;
        document.getElementById("task-desc-input").value =

        document.getElementById("task-priority-input").value = task.priority;
        document.getElementById("task-tags-input").value = task.tags.join(", ");

        // Preserve existing status logic (edit doesn't change column usually)
        // But if we wanted to, we could set the hidden input here too.

      }

      function handleTaskSubmit() {
        const title = document.getElementById("task-title-input").value.trim();
        if (!title) return;
        const desc = document.getElementById("task-desc-input").value.trim();
        const date = document.getElementById("task-date-input").value;
        const priority = document.getElementById("task-priority-input").value;
        const tagsRaw = document.getElementById("task-tags-input").value;
        const statusInput =
          document.getElementById("task-status-input").value || "college"; // Read hidden input

        const tags = tagsRaw
          .split(",")
          .map((t) => t.trim())
          .filter((t) => t.length > 0);
        if (currentEditId) {
          const task = appData.tasks.find((t) => t.id === currentEditId);
          task.title = title;
          task.description = desc;
          task.dueDate = date;
          task.priority = priority;
          task.tags = tags;
          task.subtasks = tempSubtasks;
          showToast("Task updated successfully", "success");
        } else {
          const newTask = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2),
            title,
            description: desc,
            dueDate: date,
            priority,
            status: statusInput, // Use the status from the button click
            createdAt: new Date().toISOString(),
            tags,
            subtasks: tempSubtasks,
          };
          appData.tasks.push(newTask);
          showToast("New task created", "success");
        }
        saveData();
        hideModal();
        setView("kanban");
      }
      function addSubtaskFromInput() {
        const input = document.getElementById("new-subtask-input");
        const val = input.value.trim();
        if (val) {

            id: Date.now().toString(),

      function removeTempSubtask(id) {

        renderSubtaskListInModal();

      function renderSubtaskListInModal() {

          )
          .join("");
      }
      function openTaskDetails(taskId) {

                .map(
                  (s) =>
                    `<label class="flex items-center p-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-750 cursor-pointer transition-colors"><input type="checkbox" ${

        const html = `<div class="flex justify-between items-start mb-6"><div><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-${
          statusInfo.color

        }-900/50 dark:text-${statusInfo.color}-200 mb-2"><i class="fas ${

        } mr-1.5"></i> ${
          statusInfo.title

        }</h2></div><button onclick="hideDetailModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="fas fa-times text-xl"></i></button></div><div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"><div class="md:col-span-2"><div class="prose dark:prose-invert max-w-none mb-6"><h4 class="text-sm font-bold text-gray-900 dark:text-white mb-2">Description</h4><p class="text-gray-600 dark:text-gray-300 text-sm whitespace-pre-wrap">${
          task.description || "No description provided."
        }</p></div>${subtasksHtml}</div><div class="space-y-4"><div class="bg-gray-50 dark:bg-gray-750 p-4 rounded-xl border border-gray-100 dark:border-gray-700"><div class="mb-3"><span class="text-xs text-gray-500 dark:text-gray-400 uppercase font-semibold">Priority</span><div class="text-sm font-medium capitalize dark:text-white mt-1">${
          task.priority
        }</div></div><div class="mb-3"><span class="text-xs text-gray-500 dark:text-gray-400 uppercase font-semibold">Due Date</span><div class="text-sm font-medium dark:text-white mt-1">${

        ).toLocaleDateString()}</div></div></div>${

                .map(
                  (t) =>
                    `<span class="px-2 py-1 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-xs rounded border border-indigo-100 dark:border-indigo-800">${t}</span>`

        }</div></div><div class="flex justify-end gap-3 pt-6 border-t border-gray-100 dark:border-gray-700"><button onclick="deleteTask('${
          task.id
        }')" class="px-4 py-2 text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20 rounded-lg font-medium text-sm transition-colors"><i class="fas fa-trash-alt mr-2"></i>Delete</button><button onclick="hideDetailModal(); openEditModal('${
          task.id
        }')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium text-sm shadow-md transition-colors"><i class="fas fa-pen mr-2"></i>Edit Task</button></div>`;

      function toggleSubtaskCheck(taskId, subtaskId) {
        const task = appData.tasks.find((t) => t.id === taskId);
        const sub = task.subtasks.find((s) => s.id === subtaskId);

            setView("kanban");

      function clearCompleted() {
        showConfirmDialog(
          "Clear Finished Tasks",
          "This will remove all finished tasks from the board.",
          () => {
            appData.tasks = appData.tasks.filter(
              (t) => t.status !== "completed"
            );

            setView("kanban");
            showToast("Finished tasks cleared.", "neutral");
          }
        );

      // --- STATS & GAMIFICATION VISUALIZATION ---
      // Helper Functions for Date Aggregation
      const getLocalDateString = (isoDate) => {
        const d = new Date(isoDate);
        return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
          .toISOString()
          .split("T")[0];
      };
      const getWeekNumber = (d) => {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
      };
      function getCompletionChartData() {
        const fiveYearsAgo = new Date();
        fiveYearsAgo.setFullYear(fiveYearsAgo.getFullYear() - 5);
        const relevantStats = appData.stats.filter(
          (stat) => new Date(stat.completedAt) >= fiveYearsAgo
        );
        const oneDay = 1000 * 60 * 60 * 24;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // 1. Daily (Last 7 Days)
        const dailyData = { labels: [], data: [] };
        const dailyMap = new Map();
        relevantStats.forEach((stat) => {
          const dateKey = getLocalDateString(stat.completedAt);
          dailyMap.set(dateKey, (dailyMap.get(dateKey) || 0) + 1);
        });
        for (let i = 6; i >= 0; i--) {
          const date = new Date(today.getTime() - i * oneDay);
          const dateKey = getLocalDateString(date.toISOString());
          const label = date.toLocaleDateString("en-US", {
            month: "numeric",
            day: "numeric",
          });
          dailyData.labels.push(label);
          dailyData.data.push(dailyMap.get(dateKey) || 0);
        }

        // 2. Weekly (Last 8 Weeks)
        const weeklyData = { labels: [], data: [] };
        const weeklyMap = new Map();
        relevantStats.forEach((stat) => {
          const date = new Date(stat.completedAt);
          const weekKey = `${date.getFullYear()}-${getWeekNumber(date)}`;
          weeklyMap.set(weekKey, (weeklyMap.get(weekKey) || 0) + 1);
        });
        for (let i = 7; i >= 0; i--) {
          const date = new Date(today.getTime() - i * 7 * oneDay);
          const weekKey = `${date.getFullYear()}-${getWeekNumber(date)}`;
          weeklyData.labels.push(`Wk ${getWeekNumber(date)}`);
          weeklyData.data.push(weeklyMap.get(weekKey) || 0);
        }

        // 3. Monthly (Last 12 Months)
        const monthlyData = { labels: [], data: [] };
        const monthlyMap = new Map();
        relevantStats.forEach((stat) => {
          const date = new Date(stat.completedAt);
          const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
          monthlyMap.set(monthKey, (monthlyMap.get(monthKey) || 0) + 1);
        });
        for (let i = 11; i >= 0; i--) {
          const date = new Date();
          date.setMonth(date.getMonth() - i);
          const monthKey = `${date.getFullYear()}-${date.getMonth()}`;
          monthlyData.labels.push(
            date.toLocaleDateString("en-US", {
              year: "2-digit",
              month: "short",
            })
          );
          monthlyData.data.push(monthlyMap.get(monthKey) || 0);
        }

        // 4. Yearly (Last 5 Years)
        const yearlyData = { labels: [], data: [] };
        const yearlyMap = new Map();
        relevantStats.forEach((stat) => {
          const year = new Date(stat.completedAt).getFullYear();
          yearlyMap.set(year, (yearlyMap.get(year) || 0) + 1);
        });
        for (let i = 4; i >= 0; i--) {
          const year = new Date().getFullYear() - i;
          yearlyData.labels.push(year);
          yearlyData.data.push(yearlyMap.get(year) || 0);
        }
        return {
          Daily: dailyData,
          Weekly: weeklyData,
          Monthly: monthlyData,
          Yearly: yearlyData,
        };
      }

      function renderStats(container) {
        Object.values(chartInstances).forEach((c) => c.destroy());
        chartInstances = {};
        const totalCompleted = appData.stats.length;
        const activeCounts = {};
        columns.forEach((c) => (activeCounts[c.id] = 0));
        appData.tasks.forEach((t) => {
          if (activeCounts[t.status] !== undefined) activeCounts[t.status]++;
        });
        const completedCounts = { college: 0, home: 0, personal: 0 };
        appData.stats.forEach((s) => {
          const cat = s.category || "personal";
          if (completedCounts[cat] !== undefined) completedCounts[cat]++;
        });
        const chartData = getCompletionChartData();

        container.innerHTML = `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                ${columns
                  .filter((c) => c.id !== "completed")
                  .map(
                    (col) => `
                    <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border-l-4 border-${
                      col.color
                    }-500 dark:border-${
                      col.color
                    }-500 border-gray-100 dark:border-gray-700">
                        <p class="text-sm font-medium text-${
                          col.color
                        }-600 dark:text-${col.color}-400 mb-1">Active - ${
                      col.title
                    }:</p>
                        <p class="text-3xl font-extrabold text-gray-800 dark:text-white">${
                          activeCounts[col.id]
                        }</p>
                    </div>
                `
                  )
                  .join("")}
                 <div class="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border-l-4 border-green-500 dark:border-green-500 border-gray-100 dark:border-gray-700">
                    <p class="text-sm font-medium text-green-600 dark:text-green-400 mb-1">Finished Tasks (On Board):</p>
                    <p class="text-3xl font-extrabold text-gray-800 dark:text-white">${
                      activeCounts["completed"]
                    }</p>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-8">
                <h4 class="text-lg font-bold text-gray-800 dark:text-white mb-4 flex items-center">
                    <i class="fas fa-award text-indigo-600 dark:text-indigo-400 mr-2"></i> Completion Breakdown by Category <span class="text-gray-400 text-sm font-normal ml-2">(Total: ${totalCompleted})</span>
                </h4>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800"><p class="text-xs font-bold text-blue-600 dark:text-blue-300 uppercase mb-1">College Completions</p><p class="text-2xl font-bold text-blue-800 dark:text-blue-100">${
                      completedCounts.college
                    }</p></div>
                    <div class="p-4 rounded-lg bg-amber-50 dark:bg-amber-900/20 border border-amber-100 dark:border-amber-800"><p class="text-xs font-bold text-amber-600 dark:text-amber-300 uppercase mb-1">Home Completions</p><p class="text-2xl font-bold text-amber-800 dark:text-amber-100">${
                      completedCounts.home
                    }</p></div>
                    <div class="p-4 rounded-lg bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800"><p class="text-xs font-bold text-purple-600 dark:text-purple-300 uppercase mb-1">Personal Completions</p><p class="text-2xl font-bold text-purple-800 dark:text-purple-100">${
                      completedCounts.personal
                    }</p></div>
                </div>
            </div>
            <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 mb-8">
                 <h4 class="text-lg font-bold text-gray-800 dark:text-white mb-6 flex items-center"><i class="fas fa-chart-line text-green-600 dark:text-green-400 mr-2"></i> Task Completion Over Time</h4>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${renderChartContainer("Last 7 Days (Daily)", "dailyChart")}
                    ${renderChartContainer(
                      "Last 8 Weeks (Weekly)",
                      "weeklyChart"
                    )}
                    ${renderChartContainer(
                      "Last 12 Months (Monthly)",
                      "monthlyChart"
                    )}
                    ${renderChartContainer(
                      "Last 5 Years (Yearly)",
                      "yearlyChart"
                    )}
                </div>
            </div>
        `;
        initChart(
          "dailyChart",
          chartData.Daily,
          "bar",
          "rgba(99, 102, 241, 0.7)"
        );
        initChart(
          "weeklyChart",
          chartData.Weekly,
          "bar",
          "rgba(59, 130, 246, 0.7)"
        );
        initChart(
          "monthlyChart",
          chartData.Monthly,
          "line",
          "rgba(16, 185, 129, 0.7)"
        );
        initChart(
          "yearlyChart",
          chartData.Yearly,
          "line",
          "rgba(251, 191, 36, 0.7)"
        );
      }

      function renderChartContainer(title, id) {
        return `<div class="flex flex-col h-64 border border-gray-100 dark:border-gray-700 rounded-lg p-2"><h5 class="text-sm font-semibold text-gray-600 dark:text-gray-300 mb-2">${title}</h5><div class="flex-grow relative"><canvas id="${id}"></canvas></div></div>`;
      }
      function initChart(id, data, type, color) {
        const ctx = document.getElementById(id).getContext("2d");
        const isDark = appData.settings.darkMode;
        const textColor = isDark ? "#cbd5e0" : "#4a5568";
        const gridColor = isDark ? "#4a5568" : "#e2e8f0";
        chartInstances[id] = new Chart(ctx, {
          type: type,
          data: {
            labels: data.labels,
            datasets: [
              {
                label: "Completed",
                data: data.data,
                backgroundColor: color,
                borderColor: color.replace("0.7", "1"),
                borderWidth: 2,
                borderRadius: 4,
                tension: 0.4,
                fill: type === "line",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: textColor, stepSize: 1 },
                grid: { color: gridColor },
              },
              x: {
                ticks: {
                  color: textColor,
                  maxRotation: 45,
                  minRotation: 45,
                  font: { size: 10 },
                },
                grid: { display: false },
              },
            },
          },
        });
      }

      // --- UTILITIES ---
      function toggleModal(id, show) {
        const el = document.getElementById(id);
        const backdrop = el.querySelector(".modal-backdrop");
        const content = el.querySelector(".modal-content");
        if (show) {
          el.classList.remove("hidden");
          requestAnimationFrame(() => {
            backdrop.classList.remove("opacity-0");
            content.classList.remove("scale-95", "opacity-0");
            content.classList.add("scale-100", "opacity-100");
          });
        } else {
          backdrop.classList.add("opacity-0");
          content.classList.remove("scale-100", "opacity-100");
          content.classList.add("scale-95", "opacity-0");
          setTimeout(() => el.classList.add("hidden"), 300);
        }
      }
      function hideModal() {
        toggleModal("taskModal", false);
      }
      function hideDetailModal() {
        toggleModal("detailModal", false);
      }
      let confirmCallback = null;
      function showConfirmDialog(title, msg, action) {
        document.getElementById("confirm-title").innerText = title;
        document.getElementById("confirm-message").innerText = msg;
        confirmCallback = action;
        toggleModal("confirmModal", true);
      }
      function hideConfirmModal() {
        toggleModal("confirmModal", false);
        confirmCallback = null;
      }
      document
        .getElementById("confirm-btn-action")
        .addEventListener("click", () => {
          if (confirmCallback) confirmCallback();
          hideConfirmModal();
        });

      let toastTimeout;
      function showToast(msg, type = "neutral", subMsg = null) {
        const toast = document.getElementById("toast");
        const icon = document.getElementById("toast-icon");
        const msgEl = document.getElementById("toast-message");
        const subEl = document.getElementById("toast-sub");
        msgEl.innerText = msg;
        if (subMsg) {
          subEl.innerText = subMsg;
          subEl.classList.remove("hidden");
        } else {
          subEl.classList.add("hidden");
        }
        icon.className = "";
        if (type === "success") {
          icon.className = "fas fa-check-circle text-green-400";
        } else if (type === "error") {
          icon.className = "fas fa-times-circle text-red-400";
        } else {
          icon.className = "fas fa-info-circle text-blue-400";
        }
        toast.classList.remove("translate-y-20", "opacity-0");
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toast.classList.add("translate-y-20", "opacity-0");
        }, 3000);
      }
      function handleSearch(e) {
        filters.search = e.target.value;
        setView("kanban");
      }
      function handleFilterChange() {
        filters.priority = document.getElementById("priority-filter").value;
        filters.date = document.getElementById("due-date-filter").value;
        setView("kanban");
      }
    </script>
  </body>
</html>
